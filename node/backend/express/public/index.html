<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
    </head>
    <body>
        <div>
            <h2>Create Person</h2>
            <form action="/add-card" method="post">
                <input type="text" name="FirstName" placeholder="First Name" required><br>
                <input type="text" name="LastName" placeholder="Last Name" required><br>
                <input type="text" name="Email" placeholder="Email"><br>
                <input type="number" name="Age" placeholder="Age"><br>
                <button type="submit" value="Submit">Submit</button>
            </form>
            <h2>Delete person</h2>
            <form action="/cardDelete" mathod="post">
                <input type="text" name="name" placeholder="_id" required>
                <button type="submit" value="Submit">Remove</button>
            </form>
            <h2>Delete people</h2>
            <form action="/cardsDelete" mathod="post">
                <input type="text" name="key" placeholder="key" required>
                <input type="text" name="value" placeholder="value" required>
                <button type="submit" value="Submit">Remove all</button>
            </form>
        </div>
    </body>
</html>
